name: Deploy Landing Pages (FTP)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          PUBLIC_WHATSAPP_NUMERO: ${{ secrets.PUBLIC_WHATSAPP_NUMERO }}
          PUBLIC_META_PIXEL_ID: ${{ secrets.PUBLIC_META_PIXEL_ID }}
          PUBLIC_LEADS_ENDPOINT: ${{ secrets.PUBLIC_LEADS_ENDPOINT }}
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./dist/
          # A conta FTP deploy@ramonantonio.adv.br já tem como raiz o docroot do domínio
          # (mesma conta do site institucional), por isso server-dir é "./" — os arquivos
          # caem direto na raiz: ramonantonio.adv.br/bpc-loas, /salario-maternidade, etc.
          server-dir: ./
          # state-name dedicado: este deploy só gerencia seus próprios arquivos, sem apagar
          # os do site institucional (que usa o state-name padrão).
          state-name: .ftp-deploy-sync-state-landing.json
